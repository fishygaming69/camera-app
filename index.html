<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<title>Camera</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    font-family: 'DM Sans', sans-serif;
    color: #fff;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .screen { position: fixed; inset: 0; display: none; flex-direction: column; }
  .screen.active { display: flex; }

  /* ── camera ── */
  #cameraScreen { background: #000; }
  #videoEl {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .cam-overlay {
    position: absolute; inset: 0; z-index: 2;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .cam-top {
    padding: 52px 24px 16px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.55), transparent);
    display: flex; justify-content: space-between; align-items: center;
  }
  .cam-label {
    font-size: 11px; letter-spacing: 0.12em;
    text-transform: uppercase; color: rgba(255,255,255,0.45);
  }
  .cam-status {
    font-size: 11px; color: rgba(255,255,255,0.35);
  }
  .cam-bottom {
    padding: 24px 0 44px;
    background: linear-gradient(to top, rgba(0,0,0,0.72), transparent);
    display: flex; flex-direction: column; align-items: center; gap: 16px;
  }
  .controls-row {
    display: flex; align-items: center; justify-content: space-around;
    width: 100%; padding: 0 32px;
  }

  /* gallery blocked */
  .gallery-slot {
    width: 56px; height: 56px; border-radius: 12px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center;
    position: relative; cursor: not-allowed; overflow: hidden;
  }
  .gallery-slot svg { opacity: 0.2; }
  .gallery-slot::after {
    content: '';
    position: absolute;
    width: 115%; height: 1.5px;
    background: rgba(231,76,60,0.8);
    transform: rotate(-38deg);
  }

  /* shutter */
  .shutter-outer {
    width: 82px; height: 82px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3);
    display: flex; align-items: center; justify-content: center;
  }
  #shutterBtn {
    width: 66px; height: 66px; border-radius: 50%;
    background: #efefef; border: none; outline: none;
    cursor: pointer; -webkit-appearance: none;
    transition: transform 0.08s, background 0.08s;
  }
  #shutterBtn:active { transform: scale(0.88); background: #ccc; }

  /* flip */
  .flip-btn {
    width: 56px; height: 56px; border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: 0.5px solid rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .flip-btn:active { background: rgba(255,255,255,0.2); }

  .photo-label {
    font-size: 11px; letter-spacing: 0.14em;
    text-transform: uppercase; color: rgba(255,255,255,0.3);
  }

  /* ── focus ring ── */
  #focusRing {
    position: absolute;
    width: 76px; height: 76px;
    pointer-events: none;
    z-index: 5;
    opacity: 0;
    transform: translate(-50%, -50%) scale(1.4);
    transition: opacity 0.15s ease, transform 0.2s cubic-bezier(0.25,0.46,0.45,0.94);
  }
  #focusRing.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
  #focusRing.fade {
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.9);
  }
  /* corner pieces */
  #focusRing::before, #focusRing::after,
  #focusRing .fc2::before, #focusRing .fc2::after {
    content: '';
    position: absolute;
    width: 16px; height: 16px;
    border-color: rgba(255, 220, 60, 0.95);
    border-style: solid;
  }
  #focusRing::before  { top: 0;    left: 0;  border-width: 2px 0 0 2px; }
  #focusRing::after   { top: 0;    right: 0; border-width: 2px 2px 0 0; }
  #focusRing .fc2::before { bottom: 0; left: 0;  border-width: 0 0 2px 2px; }
  #focusRing .fc2::after  { bottom: 0; right: 0; border-width: 0 2px 2px 0; }
  /* centre dot */
  #focusRing .fcdot {
    position: absolute; top: 50%; left: 50%;
    width: 4px; height: 4px; border-radius: 50%;
    background: rgba(255,220,60,0.8);
    transform: translate(-50%,-50%);
  }

  /* toast */
  #toast {
    position: fixed; bottom: 150px; left: 50%; transform: translateX(-50%);
    background: rgba(10,10,10,0.95);
    border: 0.5px solid rgba(231,76,60,0.5);
    color: rgba(255,100,80,1);
    font-size: 12px; padding: 8px 18px; border-radius: 100px;
    white-space: nowrap; opacity: 0; pointer-events: none;
    transition: opacity 0.2s; z-index: 999;
  }
  #toast.show { opacity: 1; }

  /* shutter flash */
  #shutterFlash {
    position: fixed; inset: 0; background: #fff;
    opacity: 0; pointer-events: none; z-index: 100;
    transition: opacity 0.06s;
  }
  #shutterFlash.flash { opacity: 1; }

  /* ── preview ── */
  #previewScreen { background: #000; }
  #previewCanvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%; object-fit: cover;
  }
  .preview-overlay {
    position: absolute; inset: 0; z-index: 2;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .preview-top {
    padding: 52px 20px 16px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
  }
  .retake-btn {
    background: rgba(0,0,0,0.4); border: 0.5px solid rgba(255,255,255,0.2);
    border-radius: 100px; padding: 8px 18px;
    font-size: 13px; font-family: 'DM Sans', sans-serif; color: #fff; cursor: pointer;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .preview-bottom {
    padding: 20px 24px 48px;
    background: linear-gradient(to top, rgba(0,0,0,0.78), transparent);
  }
  .next-btn {
    width: 100%; background: #fff; color: #000;
    border: none; border-radius: 16px; padding: 17px;
    font-size: 16px; font-weight: 500; font-family: 'DM Sans', sans-serif;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .next-btn:active { opacity: 0.85; }

  /* ── next screen ── */
  #nextScreen {
    background: #0a0a0a;
    align-items: center; justify-content: center;
    gap: 20px; text-align: center; padding: 40px;
  }
  #nextScreen h1 { font-size: 22px; font-weight: 400; }
  #nextScreen p { font-size: 14px; color: rgba(255,255,255,0.45); line-height: 1.65; max-width: 260px; }
  .back-link {
    margin-top: 16px; font-size: 13px; color: rgba(255,255,255,0.4);
    cursor: pointer; text-decoration: underline; text-underline-offset: 3px;
    background: none; border: none; font-family: 'DM Sans', sans-serif;
  }
</style>
</head>
<body>

<div id="shutterFlash"></div>
<div id="toast">Gallery upload is disabled</div>

<!-- CAMERA -->
<div class="screen active" id="cameraScreen">
  <video id="videoEl" autoplay playsinline muted></video>

  <!-- focus ring -->
  <div id="focusRing"><div class="fc2"></div><div class="fcdot"></div></div>

  <div class="cam-overlay">
    <div class="cam-top">
      <span class="cam-label">Camera</span>
      <span class="cam-status" id="camStatus">Starting…</span>
    </div>
    <div class="cam-bottom">
      <div class="controls-row">
        <!-- gallery blocked -->
        <div class="gallery-slot" id="galleryBtn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="3"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </div>
        <!-- shutter -->
        <div class="shutter-outer">
          <button id="shutterBtn" aria-label="Take photo"></button>
        </div>
        <!-- flip -->
        <div class="flip-btn" id="flipBtn">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round">
            <path d="M1 4v6h6"/><path d="M23 20v-6h-6"/>
            <path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4-4.64 4.36A9 9 0 013.51 15"/>
          </svg>
        </div>
      </div>
      <span class="photo-label">Photo</span>
    </div>
  </div>
</div>

<!-- PREVIEW -->
<div class="screen" id="previewScreen">
  <canvas id="previewCanvas"></canvas>
  <div class="preview-overlay">
    <div class="preview-top">
      <button class="retake-btn" id="retakeBtn">← Retake</button>
    </div>
    <div class="preview-bottom">
      <button class="next-btn" id="nextBtn">Next →</button>
    </div>
  </div>
</div>

<!-- NEXT -->
<div class="screen" id="nextScreen">
  <h1>Photo captured ✓</h1>
  <p>This is where the next step of your app will live.</p>
  <button class="back-link" id="backToCamera">Start over</button>
</div>

<script>
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }
  function setStatus(t) { document.getElementById('camStatus').textContent = t; }

  let stream = null;
  let facingMode = 'environment';
  let deviceIds = { environment: null, user: null }; // cache exact device IDs
  const video = document.getElementById('videoEl');

  // Enumerate cameras once to get exact deviceIds — much more reliable than facingMode alone
  async function getCameraDeviceId(facing) {
    if (deviceIds[facing]) return deviceIds[facing];
    try {
      const devices = await navigator.mediaDevices.enumerateDevices();
      const cameras = devices.filter(d => d.kind === 'videoinput');
      // On Android: typically index 0 = back, last = front
      if (facing === 'environment') {
        deviceIds.environment = cameras[0]?.deviceId || null;
      } else {
        deviceIds.user = cameras[cameras.length - 1]?.deviceId || null;
      }
    } catch(e) {}
    return deviceIds[facing];
  }

  async function startCamera() {
    setStatus('Starting…');
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }

    const deviceId = await getCameraDeviceId(facingMode);

    // Build constraints — prefer exact deviceId, fall back to facingMode
    const videoConstraints = deviceId
      ? { deviceId: { exact: deviceId }, width: { ideal: 4096 }, height: { ideal: 2160 } }
      : { facingMode: { exact: facingMode }, width: { ideal: 4096 }, height: { ideal: 2160 } };

    try {
      stream = await navigator.mediaDevices.getUserMedia({ video: videoConstraints, audio: false });
    } catch(e) {
      // relax resolution
      try {
        const relaxed = deviceId ? { deviceId: { exact: deviceId } } : { facingMode: { ideal: facingMode } };
        stream = await navigator.mediaDevices.getUserMedia({ video: relaxed, audio: false });
      } catch(e2) {
        // last resort — any camera
        try {
          stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        } catch(e3) {
          setStatus('Permission denied'); return;
        }
      }
    }

    video.srcObject = stream;

    // Mirror video for front camera
    video.style.transform = facingMode === 'user' ? 'scaleX(-1)' : 'none';

    try {
      await video.play();
      const t = stream.getVideoTracks()[0];
      const s = t.getSettings();
      setStatus((s.width || '?') + '×' + (s.height || '?'));
    } catch(e) {
      setStatus('Error');
    }
  }

  startCamera();

  // ── flip ──
  document.getElementById('flipBtn').addEventListener('click', () => {
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    startCamera();
  });

  // ── tap to focus ──
  const focusRing = document.getElementById('focusRing');
  let focusTimer;

  video.addEventListener('click', handleFocusTap);
  // Also catch taps that land on the overlay (but not buttons)
  document.getElementById('cameraScreen').addEventListener('click', e => {
    if (e.target.closest('#shutterBtn, .gallery-slot, .flip-btn')) return;
    handleFocusTap(e);
  });

  function handleFocusTap(e) {
    if (!stream) return;
    const x = e.clientX;
    const y = e.clientY;

    // Show focus ring
    focusRing.style.left = x + 'px';
    focusRing.style.top  = y + 'px';
    focusRing.classList.remove('show', 'fade');
    void focusRing.offsetWidth;
    focusRing.classList.add('show');

    clearTimeout(focusTimer);
    focusTimer = setTimeout(() => {
      focusRing.classList.remove('show');
      focusRing.classList.add('fade');
    }, 1800);

    const track = stream.getVideoTracks()[0];
    if (!track || !track.getCapabilities) return;
    const caps = track.getCapabilities();

    // Normalise to 0–1 range
    const nx = x / window.innerWidth;
    const ny = y / window.innerHeight;

    const advanced = [{}];

    // Focus point — singleShot is what native camera apps use; falls back to continuous
    if (caps.focusMode) {
      if (caps.focusMode.includes('single-shot')) {
        advanced[0].focusMode = 'single-shot';
      } else if (caps.focusMode.includes('continuous')) {
        advanced[0].focusMode = 'continuous';
      }
    }
    if (caps.pointsOfInterest) {
      advanced[0].pointsOfInterest = [{ x: nx, y: ny }];
    }

    // Exposure point
    if (caps.exposureMode) {
      if (caps.exposureMode.includes('single-shot')) {
        advanced[0].exposureMode = 'single-shot';
      } else if (caps.exposureMode.includes('continuous')) {
        advanced[0].exposureMode = 'continuous';
      }
    }
    if (caps.exposureCompensation) {
      // reset exposure compensation to neutral
      advanced[0].exposureCompensation = 0;
    }

    // White balance
    if (caps.whiteBalanceMode && caps.whiteBalanceMode.includes('continuous')) {
      advanced[0].whiteBalanceMode = 'continuous';
    }

    track.applyConstraints({ advanced }).catch(() => {});
  }

  // ── gallery blocked ──
  let toastTimer;
  document.getElementById('galleryBtn').addEventListener('click', e => {
    e.stopPropagation();
    const t = document.getElementById('toast');
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
  });

  // ── shutter ──
  document.getElementById('shutterBtn').addEventListener('click', e => {
    e.stopPropagation();
    if (!stream) return;

    const flash = document.getElementById('shutterFlash');
    flash.classList.add('flash');
    setTimeout(() => flash.classList.remove('flash'), 130);

    // Draw at full native resolution
    const canvas = document.getElementById('previewCanvas');
    const vw = video.videoWidth  || 1920;
    const vh = video.videoHeight || 1080;
    canvas.width  = vw;
    canvas.height = vh;

    const ctx = canvas.getContext('2d');
    ctx.save();
    if (facingMode === 'user') { ctx.translate(vw, 0); ctx.scale(-1, 1); }
    ctx.drawImage(video, 0, 0, vw, vh);
    ctx.restore();

    stream.getTracks().forEach(t => t.stop());
    stream = null;

    setTimeout(() => showScreen('previewScreen'), 100);
  });

  document.getElementById('retakeBtn').addEventListener('click', () => {
    showScreen('cameraScreen');
    startCamera();
  });
  document.getElementById('nextBtn').addEventListener('click', () => showScreen('nextScreen'));
  document.getElementById('backToCamera').addEventListener('click', () => {
    showScreen('cameraScreen');
    startCamera();
  });
</script>
</body>
</html>
