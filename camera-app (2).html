<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<title>Camera</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    font-family: sans-serif;
    color: #fff;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── screens ── */
  .screen { position: fixed; inset: 0; display: none; flex-direction: column; }
  .screen.active { display: flex; }

  /* ── camera screen ── */
  #cameraScreen { background: #000; }
  #videoEl {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .cam-overlay {
    position: absolute; inset: 0; z-index: 2;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .cam-top {
    padding: 52px 24px 16px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
    display: flex; justify-content: space-between; align-items: center;
  }
  .cam-label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.45); }

  .cam-bottom {
    padding: 24px 0 44px;
    background: linear-gradient(to top, rgba(0,0,0,0.72), transparent);
    display: flex; flex-direction: column; align-items: center; gap: 16px;
  }
  .controls-row {
    display: flex; align-items: center; justify-content: space-around;
    width: 100%; padding: 0 32px;
  }

  /* gallery blocked */
  .gallery-slot {
    width: 56px; height: 56px; border-radius: 12px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center;
    position: relative; cursor: not-allowed; overflow: hidden;
  }
  .gallery-slot svg { opacity: 0.2; }
  .gallery-slot::after {
    content: '';
    position: absolute;
    width: 115%; height: 1.5px;
    background: rgba(231,76,60,0.8);
    transform: rotate(-38deg);
  }

  /* shutter */
  .shutter-outer {
    width: 82px; height: 82px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3);
    display: flex; align-items: center; justify-content: center;
  }
  #shutterBtn {
    width: 66px; height: 66px; border-radius: 50%;
    background: #efefef; border: none; outline: none;
    cursor: pointer; -webkit-appearance: none;
    transition: transform 0.08s, background 0.08s;
  }
  #shutterBtn:active { transform: scale(0.88); background: #ccc; }

  /* flip */
  .flip-btn {
    width: 56px; height: 56px; border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: 0.5px solid rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .flip-btn:active { background: rgba(255,255,255,0.2); }

  .photo-label { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.3); }

  /* toast */
  #toast {
    position: fixed; bottom: 150px; left: 50%; transform: translateX(-50%);
    background: rgba(10,10,10,0.95);
    border: 0.5px solid rgba(231,76,60,0.5);
    color: rgba(255,100,80,1);
    font-size: 12px; padding: 8px 18px; border-radius: 100px;
    white-space: nowrap; opacity: 0; pointer-events: none;
    transition: opacity 0.2s; z-index: 999;
  }
  #toast.show { opacity: 1; }

  /* shutter flash */
  #shutterFlash {
    position: fixed; inset: 0; background: #fff;
    opacity: 0; pointer-events: none; z-index: 100;
    transition: opacity 0.06s;
  }
  #shutterFlash.flash { opacity: 1; }

  /* debug log */
  #debugLog {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.85);
    color: #0f0; font-size: 11px; font-family: monospace;
    padding: 8px 12px; max-height: 180px; overflow-y: auto;
    z-index: 200; line-height: 1.5;
  }
  #debugLog div { border-bottom: 0.5px solid rgba(255,255,255,0.08); padding: 2px 0; }
  #debugLog div.err { color: #f66; }
  #debugClose {
    position: fixed; bottom: 0; right: 0;
    background: #333; color: #fff; font-size: 11px;
    padding: 4px 10px; cursor: pointer; z-index: 201;
  }

  /* ── preview screen ── */
  #previewScreen { background: #000; }
  #previewCanvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%; object-fit: cover;
  }
  .preview-overlay {
    position: absolute; inset: 0; z-index: 2;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .preview-top {
    padding: 52px 20px 16px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
  }
  .retake-btn {
    background: rgba(0,0,0,0.4); border: 0.5px solid rgba(255,255,255,0.2);
    border-radius: 100px; padding: 8px 18px;
    font-size: 13px; font-family: sans-serif; color: #fff; cursor: pointer;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .preview-bottom {
    padding: 20px 24px 48px;
    background: linear-gradient(to top, rgba(0,0,0,0.78), transparent);
  }
  .next-btn {
    width: 100%; background: #fff; color: #000;
    border: none; border-radius: 16px; padding: 17px;
    font-size: 16px; font-weight: 500; font-family: sans-serif;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .next-btn:active { opacity: 0.85; }

  /* ── next screen ── */
  #nextScreen {
    background: #0a0a0a;
    align-items: center; justify-content: center;
    gap: 20px; text-align: center; padding: 40px;
  }
  #nextScreen h1 { font-size: 22px; font-weight: 400; }
  #nextScreen p { font-size: 14px; color: rgba(255,255,255,0.45); line-height: 1.65; max-width: 260px; }
  .back-link {
    margin-top: 16px; font-size: 13px; color: rgba(255,255,255,0.4);
    cursor: pointer; text-decoration: underline; text-underline-offset: 3px;
    background: none; border: none; font-family: sans-serif;
  }
</style>
</head>
<body>

<div id="shutterFlash"></div>
<div id="toast">Gallery upload is disabled</div>

<!-- CAMERA -->
<div class="screen active" id="cameraScreen">
  <video id="videoEl" autoplay playsinline muted></video>

  <div class="cam-overlay">
    <div class="cam-top">
      <span class="cam-label">Camera</span>
      <span style="font-size:11px;color:rgba(255,255,255,0.35);" id="camStatus">Starting…</span>
    </div>

    <div class="cam-bottom">
      <div class="controls-row">
        <div class="gallery-slot" id="galleryBtn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="3"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </div>

        <div class="shutter-outer">
          <button id="shutterBtn" aria-label="Take photo"></button>
        </div>

        <div class="flip-btn" id="flipBtn">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round">
            <path d="M1 4v6h6"/><path d="M23 20v-6h-6"/>
            <path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4-4.64 4.36A9 9 0 013.51 15"/>
          </svg>
        </div>
      </div>
      <span class="photo-label">Photo</span>
    </div>
  </div>
</div>

<!-- PREVIEW -->
<div class="screen" id="previewScreen">
  <canvas id="previewCanvas"></canvas>
  <div class="preview-overlay">
    <div class="preview-top">
      <button class="retake-btn" id="retakeBtn">← Retake</button>
    </div>
    <div class="preview-bottom">
      <button class="next-btn" id="nextBtn">
        Next →
      </button>
    </div>
  </div>
</div>

<!-- NEXT -->
<div class="screen" id="nextScreen">
  <h1>Photo captured ✓</h1>
  <p>This is where the next step of your app will live.</p>
  <button class="back-link" id="backToCamera">Start over</button>
</div>

<!-- DEBUG -->
<div id="debugLog"></div>
<div id="debugClose" onclick="document.getElementById('debugLog').style.display='none';this.style.display='none'">✕ hide log</div>

<script>
  // ── debug logger ──
  const logEl = document.getElementById('debugLog');
  function log(msg, isErr) {
    const d = document.createElement('div');
    if (isErr) d.className = 'err';
    d.textContent = (new Date().toISOString().slice(11,23)) + '  ' + msg;
    logEl.appendChild(d);
    logEl.scrollTop = logEl.scrollHeight;
    console.log(msg);
  }

  log('Page loaded. Protocol: ' + location.protocol);
  log('UA: ' + navigator.userAgent.slice(0,80));
  log('mediaDevices exists: ' + !!navigator.mediaDevices);

  // ── screen switch ──
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function setStatus(txt) {
    document.getElementById('camStatus').textContent = txt;
  }

  // ── camera ──
  let stream = null;
  let facingMode = 'environment';
  const video = document.getElementById('videoEl');

  async function startCamera() {
    setStatus('Requesting…');
    log('startCamera() called, facingMode=' + facingMode);

    if (stream) {
      stream.getTracks().forEach(t => { t.stop(); log('stopped track: ' + t.label); });
      stream = null;
    }

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      log('getUserMedia NOT supported on this browser/protocol', true);
      setStatus('Not supported');
      return;
    }

    // Attempt 1 – ideal facingMode
    try {
      log('Attempt 1: facingMode ideal=' + facingMode);
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: facingMode } },
        audio: false
      });
      log('Attempt 1 SUCCESS. Tracks: ' + stream.getVideoTracks().map(t=>t.label).join(', '));
    } catch(e) {
      log('Attempt 1 FAILED: ' + e.name + ' – ' + e.message, true);

      // Attempt 2 – plain video:true
      try {
        log('Attempt 2: plain video:true');
        stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        log('Attempt 2 SUCCESS. Tracks: ' + stream.getVideoTracks().map(t=>t.label).join(', '));
      } catch(e2) {
        log('Attempt 2 FAILED: ' + e2.name + ' – ' + e2.message, true);
        setStatus('Permission denied');
        return;
      }
    }

    video.srcObject = stream;
    log('srcObject set');

    try {
      await video.play();
      log('video.play() resolved. videoWidth=' + video.videoWidth + ' videoHeight=' + video.videoHeight);
      setStatus('Live ✓');
    } catch(e) {
      log('video.play() FAILED: ' + e.name + ' – ' + e.message, true);
      setStatus('Play failed');
    }
  }

  startCamera();

  // ── flip ──
  document.getElementById('flipBtn').addEventListener('click', () => {
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    log('flip → ' + facingMode);
    startCamera();
  });

  // ── gallery blocked ──
  let toastTimer;
  document.getElementById('galleryBtn').addEventListener('click', () => {
    const t = document.getElementById('toast');
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
  });

  // ── shutter ──
  document.getElementById('shutterBtn').addEventListener('click', () => {
    if (!stream) { log('shutter tapped but no stream', true); return; }
    log('shutter tapped');

    const flash = document.getElementById('shutterFlash');
    flash.classList.add('flash');
    setTimeout(() => flash.classList.remove('flash'), 130);

    const canvas = document.getElementById('previewCanvas');
    const vw = video.videoWidth  || 1280;
    const vh = video.videoHeight || 720;
    log('canvas size: ' + vw + 'x' + vh);
    canvas.width = vw; canvas.height = vh;

    const ctx = canvas.getContext('2d');
    ctx.save();
    if (facingMode === 'user') { ctx.translate(vw,0); ctx.scale(-1,1); }
    ctx.drawImage(video, 0, 0, vw, vh);
    ctx.restore();

    stream.getTracks().forEach(t => t.stop());
    stream = null;

    setTimeout(() => showScreen('previewScreen'), 100);
  });

  // ── retake ──
  document.getElementById('retakeBtn').addEventListener('click', () => {
    showScreen('cameraScreen');
    startCamera();
  });

  // ── next ──
  document.getElementById('nextBtn').addEventListener('click', () => showScreen('nextScreen'));

  // ── back ──
  document.getElementById('backToCamera').addEventListener('click', () => {
    showScreen('cameraScreen');
    startCamera();
  });
</script>
</body>
</html>
